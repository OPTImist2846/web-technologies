<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна: Світлофор</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 30px; background-color: #2c3e50; color: white; }
        
        .traffic-light {
            background-color: #1a1a1a;
            width: 120px;
            padding: 20px;
            border-radius: 40px;
            margin: 0 auto 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .light {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto;
            opacity: 0.15;
            transition: opacity 0.3s ease;
        }

        .red { background-color: #ff3333; }
        .red.active { opacity: 1; box-shadow: 0 0 40px #ff3333; }

        .yellow { background-color: #ffcc00; }
        .yellow.active { opacity: 1; box-shadow: 0 0 40px #ffcc00; }

        .green { background-color: #33cc33; }
        .green.active { opacity: 1; box-shadow: 0 0 40px #33cc33; }

        h2 { font-size: 28px; margin-bottom: 5px; }
        #statusText { font-size: 24px; font-weight: bold; color: #f1c40f; text-transform: uppercase; height: 30px; }

        .controls { margin-top: 20px; }
        button { padding: 12px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; background-color: #3498db; color: white; font-weight: bold;}
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <h2>Світлофор</h2>
    <div id="statusText">Запуск...</div>

    <div class="traffic-light">
        <div id="redLight" class="light red"></div>
        <div id="yellowLight" class="light yellow"></div>
        <div id="greenLight" class="light green"></div>
    </div>

    <div class="controls">
        <button id="nextBtn">Наступний стан (Вручну)</button>
        <button id="setTimeBtn">Змінити тривалість</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
