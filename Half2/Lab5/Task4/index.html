<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна: Інтернет-магазин</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background-color: #f4f6f9; color: #333; }
        .container { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; text-align: center; }
        button { padding: 12px 24px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        p { font-size: 18px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Облік продуктів (Map & Set)</h1>
        <p>Уся логіка магазину реалізована у скрипті.</p>
        <p>Натисніть кнопку нижче і відкрийте <b>Console (F12)</b>, щоб побачити симуляцію роботи магазину.</p>
        <button id="runStoreBtn">Запустити симуляцію магазину</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
