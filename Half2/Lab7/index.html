<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Wild Gunman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        
        <div class="hud">
            <div id="score-display">REWARD: $0</div>
            <div id="round-display">ROUND: 1</div>
        </div>

        <div id="message-box" class="hidden">FIRE!!!</div>

        <div id="play-area">
            <div id="gunman" class="idle"></div>
        </div>

        <div id="result-screen">
            <h1 id="result-title">WILD GUNMAN</h1>
            <p id="result-text">Press Start to Play</p>
            <button id="start-btn">START</button>
        </div>

    </div>
    
<script src="game.js"></script>
</body>
</html>
