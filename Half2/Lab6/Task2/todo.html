<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список завдань (To-Do List)</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Мої завдання</h1>
        </header>

        <section class="add-task-section">
            <form id="taskForm" class="task-form">
                <input type="text" id="taskInput" required minlength="3" placeholder="Що потрібно зробити?" autocomplete="off">
                <button type="submit" class="btn btn-primary">Додати</button>
            </form>
        </section>

        <section class="sort-section">
            <span>Сортувати:</span>
            <div id="sortBtns" class="btn-group">
                <button class="btn sort-btn active" data-sort="addedDesc">Спочатку нові</button>
                <button class="btn sort-btn" data-sort="status">За статусом (невиконані)</button>
                <button class="btn sort-btn" data-sort="updated">За датою оновлення</button>
            </div>
        </section>

        <main class="content">
            <div id="emptyState" class="empty-state hidden">
                У вас немає жодного завдання. Додайте перше!
            </div>
            <ul id="taskList" class="task-list"></ul>
        </main>
    </div>

    <div id="snackbar" class="snackbar"></div>

    <script src="todo.js"></script>
</body>
</html>
