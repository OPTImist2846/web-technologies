<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управління товарами</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Каталог товарів</h1>
        <div class="total-price">Загальна вартість: <span id="totalPriceVal">0.00 грн</span></div>
    </header>

    <div class="container">
        <aside class="controls">
            <button id="addBtn" class="btn btn-primary">Додати новий товар</button>
            
            <div class="control-group">
                <h3>Фільтрація:</h3>
                <div id="filterBtns" class="btn-group">
                    <button class="btn filter-btn active" data-filter="all">Всі</button>
                    <button class="btn filter-btn" data-filter="Електроніка">Електроніка</button>
                    <button class="btn filter-btn" data-filter="Одяг">Одяг</button>
                    <button class="btn filter-btn" data-filter="Книги">Книги</button>
                </div>
            </div>

            <div class="control-group">
                <h3>Сортування:</h3>
                <div id="sortBtns" class="btn-group">
                    <button class="btn sort-btn" data-sort="price">За ціною</button>
                    <button class="btn sort-btn" data-sort="created">За датою додавання</button>
                    <button class="btn sort-btn" data-sort="updated">За датою оновлення</button>
                    <button class="btn sort-btn active" data-sort="none">Без сортування</button>
                </div>
            </div>
        </aside>

        <main class="content">
            <div id="emptyState" class="empty-state hidden">
                Наразі список товарів пустий. Додайте новий товар.
            </div>
            <div id="productList" class="product-grid"></div>
        </main>
    </div>

    <div id="productModal" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="modalTitle">Додати товар</h2>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label for="productName">Назва товару:</label>
                    <input type="text" id="productName" required minlength="2" placeholder="Введіть назву">
                </div>
                <div class="form-group">
                    <label for="productPrice">Ціна (грн):</label>
                    <input type="number" id="productPrice" required min="0.01" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="productCategory">Категорія:</label>
                    <select id="productCategory" required>
                        <option value="">Оберіть категорію</option>
                        <option value="Електроніка">Електроніка</option>
                        <option value="Одяг">Одяг</option>
                        <option value="Книги">Книги</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="productImage">URL зображення:</label>
                    <input type="url" id="productImage" required placeholder="https://...">
                </div>
                <div class="modal-actions">
                    <button type="button" id="closeModalBtn" class="btn">Скасувати</button>
                    <button type="submit" class="btn btn-primary">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <div id="snackbar" class="snackbar"></div>

    <script src="script.js"></script>
</body>
</html>
